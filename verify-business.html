<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Business Certification | TGSOBA Bureau</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --obsidian: #050505; --slate: #111; }
        body { background: var(--obsidian); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 50px 5%; }
        .form-header { border-left: 4px solid var(--gold); padding-left: 20px; margin-bottom: 40px; }
        .form-section { background: var(--slate); border: 1px solid #222; padding: 40px; margin-bottom: 30px; }
        h3 { font-family: 'Cinzel'; color: var(--gold); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 5px; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; box-sizing: border-box; }
        .btn-gold { padding: 15px 40px; background: var(--gold); color: black; border: none; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="form-header">
        <h1 style="font-family:'Cinzel'; margin:0;">Enterprise Seal Application</h1>
        <p style="color:var(--gold)">Registering Your Entity within the Family of Corporations.</p>
    </div>

    <form action="products.html">
        <div class="form-section">
            <h3>I. Entity Details</h3>
            <label>Legal Business Name</label>
            <input type="text" placeholder="Acme Logistics, LLC">
            <label>Tax ID / EIN</label>
            <input type="text" placeholder="XX-XXXXXXX">
            <label>Business Category</label>
            <select>
                <option>Construction & Infrastructure</option>
                <option>Technology & Software</option>
                <option>Logistics & Supply Chain</option>
                <option>Professional Services / Legal</option>
                <option>Retail / Community Safe Haven</option>
            </select>
        </div>

        <div class="form-section">
            <h3>II. Community Impact & Hiring</h3>
            <label>Current Number of "Pillar" (Returning Citizen) Employees</label>
            <input type="number" placeholder="0">
            <label>Commitment to Section 3 Compliance</label>
            <select>
                <option>Actively Compliant</option>
                <option>Seeking Certification via TBBLUSA</option>
                <option>Not Yet Applicable</option>
            </select>
            <label>Upload Capability Statement (PDF)</label>
            <input type="file" style="border:none;">
        </div>

        <div class="form-section">
            <h3>III. Seal Tier Selection</h3>
            <label>Select Certification Level</label>
            <select style="border: 1px solid var(--gold)">
                <option>Community Partner - $99.00/mo</option>
                <option>Enterprise Sovereign - $499.00/mo</option>
                <option>Foundry Patron (Annual) - $1,500.00</option>
            </select>
        </div>

        <div style="text-align: right;">
            <button type="submit" class="btn-gold">Submit for Bureau Review</button>
        </div>
    </form>

</body>
</html>
